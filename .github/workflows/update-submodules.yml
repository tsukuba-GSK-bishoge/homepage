name: Update Submodules

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Update submodules to latest
        run: git submodule update --remote --recursive

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Close existing submodule update PRs
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr list --label "submodule-update" --state open --json number --jq '.[].number' | while read -r pr_number; do
            echo "Closing PR #${pr_number}"
            gh pr close "$pr_number" --comment "Closed in favor of a newer submodule update PR."
          done

      - name: Create branch and PR
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          branch_name="chore/update-submodules-$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$branch_name"
          git add -A
          git commit -m "chore: update submodules to latest"
          git push origin "$branch_name"

          gh pr create \
            --title "chore: update submodules to latest" \
            --body "$(cat <<'EOF'
          ## Summary
          - Automated submodule update via `git submodule update --remote --recursive`

          This PR was created automatically by the scheduled GitHub Actions workflow.
          EOF
          )" \
            --base master \
            --head "$branch_name" \
            --label "submodule-update"
