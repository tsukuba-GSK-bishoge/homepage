name: Update Submodules

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Create App Token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.ACTIONS_BOT_APP_ID }}
          private-key: ${{ secrets.ACTIONS_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: "homepage,homepage-fonts,shinkan26-game"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Update submodules to latest
        run: git submodule update --remote --recursive

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          commit-message: "chore: update submodules to latest"
          branch: chore/update-submodules
          title: "chore: update submodules to latest"
          body: |
            ## Summary
            - Automated submodule update via `git submodule update --remote --recursive`

            This PR was created automatically by the scheduled GitHub Actions workflow.
          labels: submodule-update
          base: master
